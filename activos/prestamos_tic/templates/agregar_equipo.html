<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Equipo - Sistema de Préstamos TIC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>➕ Agregar Nuevo Equipo</h1>
            <p>Registra un nuevo equipo tecnológico en el inventario</p>
        </div>
        
        <div class="nav-bar">
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">Equipos</a></li>
                <li><a href="{{ url_for('agregar_equipo') }}" class="active">Agregar Equipo</a></li>
                <li><a href="{{ url_for('ver_prestamos') }}">Préstamos Activos</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="form-container">
                <form method="POST" action="{{ url_for('agregar_equipo') }}">
                    <div class="form-group">
                        <label for="nombre">Nombre del equipo *</label>
                        <input type="text" id="nombre" name="nombre" class="form-control" required 
                            placeholder="Ej: Laptop Dell XPS, Proyector Epson, etc.">
                    </div>
                    
                    <div class="form-group">
                        <label for="tipo">Tipo de equipo *</label>
                        <select id="tipo" name="tipo" class="form-control" required>
                            <option value="">Seleccione un tipo</option>
                            <option value="Laptop">Laptop</option>
                            <option value="Desktop">Desktop</option>
                            <option value="Tablet">Tablet</option>
                            <option value="Proyector">Proyector</option>
                            <option value="Impresora">Impresora</option>
                            <option value="Router">Router</option>
                            <option value="Switch">Switch</option>
                            <option value="Accesorio">Accesorio</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="marca">Marca *</label>
                        <input type="text" id="marca" name="marca" class="form-control" required 
                               placeholder="Ej: Dell, HP, Lenovo, Epson">
                    </div>
                    
                    <div class="form-group">
                        <label for="modelo">Modelo *</label>
                        <input type="text" id="modelo" name="modelo" class="form-control" required 
                               placeholder="Ej: XPS 15, Pavilion, ThinkPad">
                    </div>
                    
                    <div class="form-group">
                        <label for="serial">Número de serie *</label>
                        <input type="text" id="serial" name="serial" class="form-control" required 
                               placeholder="Ingrese el número de serie único">
                    </div>
                    
                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button type="submit" class="btn btn-primary">Guardar Equipo</button>
                        <a href="{{ url_for('index') }}" class="btn btn-danger">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="footer">
            <p>&copy; 2024 Sistema de Préstamos TIC - Todos los derechos reservados</p>
        </div>
    </div>
</body>
</html>
