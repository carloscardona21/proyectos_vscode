<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Activo TIC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-edit"></i> Editar Activo #{{ activo.id }}
            </span>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4>Editar Información del Activo</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Tipo de dispositivo *</label>
                            <select name="tipo_dispositivo" class="form-control" required>
                                <option value="PC" {% if activo.tipo_dispositivo == 'PC' %}selected{% endif %}>PC</option>
                                <option value="Impresora" {% if activo.tipo_dispositivo == 'Impresora' %}selected{% endif %}>Impresora</option>
                                <option value="Teléfono" {% if activo.tipo_dispositivo == 'Teléfono' %}selected{% endif %}>Teléfono</option>
                                <option value="Monitor" {% if activo.tipo_dispositivo == 'Monitor' %}selected{% endif %}>Monitor</option>
                                <option value="AP" {% if activo.tipo_dispositivo == 'AP' %}selected{% endif %}>AP</option>
                                <option value="Televisor" {% if activo.tipo_dispositivo == 'Televisor' %}selected{% endif %}>Televisor</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Dispositivos</label>
                            <input type="text" name="dispositivos" class="form-control" value="{{ activo.dispositivos or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Marca</label>
                            <input type="text" name="marca" class="form-control" value="{{ activo.marca or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Modelo</label>
                            <input type="text" name="modelo" class="form-control" value="{{ activo.modelo or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Número de serie</label>
                            <input type="text" name="numero_serie" class="form-control" value="{{ activo.numero_serie or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Procesador</label>
                            <input type="text" name="procesador" class="form-control" value="{{ activo.procesador or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Generación</label>
                            <input type="text" name="generacion" class="form-control" value="{{ activo.generacion or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Velocidad (GHz)</label>
                            <input type="text" name="velocidad_ghz" class="form-control" value="{{ activo.velocidad_ghz or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Memoria RAM (GB)</label>
                            <input type="text" name="memoria_ram_gb" class="form-control" value="{{ activo.memoria_ram_gb or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Tipo de almacenamiento</label>
                            <input type="text" name="tipo_almacenamiento" class="form-control" value="{{ activo.tipo_almacenamiento or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Capacidad almacenamiento (GB)</label>
                            <input type="text" name="capacidad_almacenamiento_gb" class="form-control" value="{{ activo.capacidad_almacenamiento_gb or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Sistema operativo/versión</label>
                            <input type="text" name="sistema_operativo_version" class="form-control" value="{{ activo.sistema_operativo_version or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Activo Fijo UAM</label>
                            <input type="text" name="activo_fijo_uam" class="form-control" value="{{ activo.activo_fijo_uam or '' }}">
                        </div>
                        
                        <div class="col-md-12 mt-3">
                            <h5>Ubicación</h5>
                            <hr>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Ubicación</label>
                            <input type="text" name="ubicacion" class="form-control" value="{{ activo.ubicacion or '' }}">
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Bloque</label>
                            <input type="text" name="bloque" class="form-control" value="{{ activo.bloque or '' }}">
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Piso</label>
                            <input type="text" name="piso" class="form-control" value="{{ activo.piso or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Espacio</label>
                            <input type="text" name="espacio" class="form-control" value="{{ activo.espacio or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Puesto/Numeración</label>
                            <input type="text" name="puesto_numeracion" class="form-control" value="{{ activo.puesto_numeracion or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Modalidad laboral</label>
                            <select name="modalidad_laboral" class="form-control">
                                <option value="">Seleccione...</option>
                                <option {% if activo.modalidad_laboral == 'Presencial' %}selected{% endif %}>Presencial</option>
                                <option {% if activo.modalidad_laboral == 'Teletrabajo' %}selected{% endif %}>Teletrabajo</option>
                                <option {% if activo.modalidad_laboral == 'Híbrido' %}selected{% endif %}>Híbrido</option>
                            </select>
                        </div>
                        
                        <div class="col-md-12 mt-3">
                            <h5>Dirección</h5>
                            <hr>
                        </div>
                        
                        <div class="col-md-2 mb-3">
                            <label class="form-label">País</label>
                            <input type="text" name="pais" class="form-control" value="{{ activo.pais or 'Colombia' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Departamento</label>
                            <input type="text" name="departamento" class="form-control" value="{{ activo.departamento or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Municipio</label>
                            <input type="text" name="municipio" class="form-control" value="{{ activo.municipio or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Barrio</label>
                            <input type="text" name="barrio" class="form-control" value="{{ activo.barrio or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Dirección Sede</label>
                            <input type="text" name="direccion_sede" class="form-control" value="{{ activo.direccion_sede or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Dirección Teletrabajo</label>
                            <input type="text" name="direccion_teletrabajo" class="form-control" value="{{ activo.direccion_teletrabajo or '' }}">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Observaciones Teletrabajo</label>
                            <textarea name="observaciones_teletrabajo" class="form-control" rows="2">{{ activo.observaciones_teletrabajo or '' }}</textarea>
                        </div>
                        
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Estado</label>
                            <select name="estado" class="form-control">
                                <option {% if activo.estado == 'Activo' %}selected{% endif %}>Activo</option>
                                <option {% if activo.estado == 'Mantenimiento' %}selected{% endif %}>Mantenimiento</option>
                                <option {% if activo.estado == 'Baja' %}selected{% endif %}>Baja</option>
                                <option {% if activo.estado == 'Reparación' %}selected{% endif %}>Reparación</option>
                            </select>
                        </div>
                        <div class="col-md-5 mb-3">
                            <label class="form-label">Responsable / usuario asignado</label>
                            <input type="text" name="responsable_usuario" class="form-control" value="{{ activo.responsable_usuario or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Fecha de adquisición</label>
                            <input type="date" name="fecha_adquisicion" class="form-control" value="{{ activo.fecha_adquisicion or '' }}">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Comentarios</label>
                            <textarea name="comentarios" class="form-control" rows="3">{{ activo.comentarios or '' }}</textarea>
                        </div>
                    </div>
                    
                    <div class="text-center mt-3">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save"></i> Actualizar Activo
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
